<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Windows WebCodecs 压力诊断 v2</title>
  <style>
    body {
      font-family: ui-sans-serif, system-ui, sans-serif;
      max-width: 980px;
      margin: 24px auto;
      padding: 0 16px;
    }

    h1 {
      font-size: 20px;
    }

    .hint {
      color: #555;
      font-size: 14px;
      line-height: 1.5;
    }

    .row {
      margin: 12px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 13px;
    }

    th,
    td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #f5f5f5;
    }

    .pass {
      color: #0a7;
      font-weight: 600;
    }

    .fail {
      color: #c00;
      font-weight: 600;
    }

    .skip {
      color: #888;
    }

    .run {
      color: #06c;
      font-weight: 600;
    }

    #heartbeat {
      margin-top: 8px;
      padding: 8px 12px;
      background: #fff8e6;
      border: 1px solid #f0d78c;
      font-size: 13px;
      display: none;
    }

    #log {
      background: #111;
      color: #ddd;
      padding: 12px;
      height: 320px;
      overflow: auto;
      font: 12px/1.4 ui-monospace, monospace;
      margin-top: 12px;
    }

    .ok {
      color: #4ec9b0;
    }

    .err {
      color: #f14c4c;
    }

    .info {
      color: #dcdcaa;
    }
  </style>
</head>

<body>
  <h1>Windows WebCodecs 压力诊断 v2</h1>
  <p class="hint">
    v1 全 PASS 说明「单次 flush」不是触发器。本页贴近生产：
    <strong>同 decoder 反复 flush（模拟 seek）</strong>、
    <strong>多路并发硬解</strong>、
    <strong>用 demuxer.read() 拿 EncodedVideoChunk</strong>（与 DemuxerManager 一致）。
  </p>

  <div class="row">
    <input type="file" id="file" accept="video/*" />
    <label>单次 flush 超时(ms)
      <input id="timeout" type="number" value="5000" min="500" step="500" style="width:90px" />
    </label>
    <label>反复 flush 次数
      <input id="loops" type="number" value="40" min="5" max="200" style="width:70px" />
    </label>
    <label>并发路数
      <input id="lanes" type="number" value="4" min="1" max="8" style="width:50px" />
    </label>
    <button id="run" disabled>跑压力矩阵</button>
    <button id="abort" disabled>中止</button>
  </div>
  <div id="heartbeat"></div>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>用例</th>
        <th>结果</th>
        <th>耗时</th>
        <th>备注</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="log"></div>

  <script type="module">
    const WEB_DEMUXER_CDN = 'https://cdn.jsdelivr.net/npm/web-demuxer/+esm';
    const WASM_CDN = 'https://cdn.jsdelivr.net/npm/web-demuxer@latest/dist/wasm-files/web-demuxer.wasm';

    const CASES = [
      {
        id: 'S0-soft-loop',
        title: 'prefer-software × 反复 flush（对照）',
        kind: 'loop',
        hardwareAcceleration: 'prefer-software',
        optimizeForLatency: true,
      },
      {
        id: 'S1-default-loop',
        title: '默认加速 × 反复 flush（生产配置去掉 prefer-software）',
        kind: 'loop',
        hardwareAcceleration: undefined,
        optimizeForLatency: true,
      },
      {
        id: 'S2-hw-loop',
        title: 'prefer-hardware × 反复 flush',
        kind: 'loop',
        hardwareAcceleration: 'prefer-hardware',
        optimizeForLatency: true,
      },
      {
        id: 'S3-default-nolan',
        title: '默认加速 × 反复 flush（无 optimizeForLatency）',
        kind: 'loop',
        hardwareAcceleration: undefined,
        optimizeForLatency: undefined,
      },
      {
        id: 'M0-soft-multi',
        title: 'prefer-software × N 路并发各 flush 1 次',
        kind: 'multi',
        hardwareAcceleration: 'prefer-software',
        optimizeForLatency: true,
      },
      {
        id: 'M1-default-multi',
        title: '默认加速 × N 路并发各 flush 1 次',
        kind: 'multi',
        hardwareAcceleration: undefined,
        optimizeForLatency: true,
      },
      {
        id: 'M2-hw-multi',
        title: 'prefer-hardware × N 路并发各 flush 1 次',
        kind: 'multi',
        hardwareAcceleration: 'prefer-hardware',
        optimizeForLatency: true,
      },
      {
        id: 'M3-default-multi-loop',
        title: '默认加速 × N 路并发 × 每路反复 flush',
        kind: 'multi-loop',
        hardwareAcceleration: undefined,
        optimizeForLatency: true,
      },
    ];

    const fileEl = document.getElementById('file');
    const runBtn = document.getElementById('run');
    const abortBtn = document.getElementById('abort');
    const tbody = document.getElementById('tbody');
    const logEl = document.getElementById('log');
    const timeoutEl = document.getElementById('timeout');
    const loopsEl = document.getElementById('loops');
    const lanesEl = document.getElementById('lanes');
    const heartbeatEl = document.getElementById('heartbeat');

    let demuxer = null;
    let videoMeta = null;
    /** @type {EncodedVideoChunk[]} */
    let sampleChunks = [];
    let aborted = false;
    let heartbeatTimer = null;

    function log(msg, cls = 'info') {
      const line = document.createElement('div');
      line.className = cls;
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
      console.log(msg);
    }

    function setHeartbeat(text) {
      if (!text) {
        heartbeatEl.style.display = 'none';
        heartbeatEl.textContent = '';
        return;
      }
      heartbeatEl.style.display = 'block';
      heartbeatEl.textContent = text;
    }

    function startHeartbeat(label) {
      stopHeartbeat();
      const t0 = performance.now();
      setHeartbeat(`进行中：${label}（0.0s）`);
      heartbeatTimer = setInterval(() => {
        const s = ((performance.now() - t0) / 1000).toFixed(1);
        setHeartbeat(`进行中：${label}（${s}s）— 超时会 close 并 FAIL`);
      }, 200);
    }

    function stopHeartbeat() {
      if (heartbeatTimer) {
        clearInterval(heartbeatTimer);
        heartbeatTimer = null;
      }
    }

    function paint() {
      return new Promise((r) => setTimeout(r, 0));
    }

    function flushWithTimeout(decoder, ms, label) {
      return new Promise((resolve, reject) => {
        let settled = false;
        const t = setTimeout(() => {
          if (settled) return;
          settled = true;
          try {
            decoder.close();
          } catch (_) { }
          reject(new Error(`${label} 超时 ${ms}ms（flush pending，已 close）`));
        }, ms);

        let p;
        try {
          p = decoder.flush();
        } catch (e) {
          clearTimeout(t);
          settled = true;
          reject(e);
          return;
        }
        p.then(
          (v) => {
            if (settled) return;
            settled = true;
            clearTimeout(t);
            resolve(v);
          },
          (e) => {
            if (settled) return;
            settled = true;
            clearTimeout(t);
            reject(e);
          },
        );
      });
    }

    function safeClose(decoder) {
      try {
        if (decoder && decoder.state !== 'closed') decoder.close();
      } catch (_) { }
    }

    function buildConfig(c) {
      const config = {
        codec: videoMeta.codec,
        codedWidth: videoMeta.width,
        codedHeight: videoMeta.height,
        description: videoMeta.description,
      };
      if (c.hardwareAcceleration !== undefined) {
        config.hardwareAcceleration = c.hardwareAcceleration;
      }
      if (c.optimizeForLatency !== undefined) {
        config.optimizeForLatency = c.optimizeForLatency;
      }
      return config;
    }

    function renderRows() {
      tbody.innerHTML = '';
      CASES.forEach((c, i) => {
        const tr = document.createElement('tr');
        tr.id = `row-${c.id}`;
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td>${c.title}</td>
          <td class="skip" data-status>—</td>
          <td data-ms>—</td>
          <td data-note></td>`;
        tbody.appendChild(tr);
      });
    }

    function setRow(id, status, ms, note) {
      const tr = document.getElementById(`row-${id}`);
      const st = tr.querySelector('[data-status]');
      st.textContent = status;
      st.className =
        status === 'PASS' ? 'pass' : status === 'FAIL' ? 'fail' : status === 'RUN' ? 'run' : 'skip';
      tr.querySelector('[data-ms]').textContent = ms != null ? `${ms.toFixed(0)}ms` : '—';
      tr.querySelector('[data-note]').textContent = note || '';
    }

    /** 克隆 chunk：同一 EncodedVideoChunk 不能 decode 两次 */
    function cloneChunks(chunks) {
      return chunks.map(
        (c) =>
          new EncodedVideoChunk({
            type: c.type,
            timestamp: c.timestamp,
            duration: c.duration,
            data: (() => {
              const buf = new ArrayBuffer(c.byteLength);
              c.copyTo(buf);
              return buf;
            })(),
          }),
      );
    }

    async function readSamplesLikeProduction(endSec) {
      // 与 DemuxerManager.readEncodedSamples 一致：demuxer.read('video', start, end)
      if (typeof demuxer.read === 'function') {
        const stream = demuxer.read('video', 0, endSec);
        const reader = stream.getReader();
        const chunks = [];
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          chunks.push(value);
        }
        return { chunks, api: 'read()' };
      }
      // 回退
      const raw = [];
      if (demuxer.readMediaPacket) {
        for await (const p of demuxer.readMediaPacket('video', 0, endSec)) raw.push(p);
      } else if (demuxer.readAVPacket) {
        for await (const p of demuxer.readAVPacket(0, endSec)) raw.push(p);
      }
      const chunks = raw.map(
        (p) =>
          new EncodedVideoChunk({
            type: p.keyframe || p.type === 'key' ? 'key' : 'delta',
            timestamp:
              typeof p.timestamp === 'number' && p.timestamp < 1e6
                ? Math.floor(p.timestamp * 1e6)
                : Math.floor(p.timestamp),
            data: p.data,
          }),
      );
      return { chunks, api: 'readMediaPacket/AVPacket' };
    }

    fileEl.addEventListener('change', async () => {
      runBtn.disabled = true;
      const file = fileEl.files?.[0];
      if (!file) return;
      logEl.innerHTML = '';
      renderRows();
      setHeartbeat('demux / 读样本…');
      try {
        log(`加载 ${file.name}`);
        await paint();
        const mod = await import(WEB_DEMUXER_CDN);
        const WebDemuxer = mod.WebDemuxer || mod.default;
        demuxer = new WebDemuxer({ wasmFilePath: WASM_CDN });
        await demuxer.load(file);
        const mediaInfo = await demuxer.getMediaInfo();
        const vconf = await demuxer.getDecoderConfig('video');
        const videoStream =
          (mediaInfo.streams || []).find((s) => s.codec_type === 0 || s.codec_type === 'video') ||
          mediaInfo.streams?.[0];
        const raw = videoStream?.r_frame_rate || '30/1';
        const [n, d] = raw.split('/').map(Number);
        const fps = d ? n / d : n || 30;
        const duration = mediaInfo.duration || videoStream?.duration || 0;
        videoMeta = {
          codec: vconf.codec,
          width: vconf.codedWidth,
          height: vconf.codedHeight,
          description: vconf.description,
          fps,
          duration,
        };
        log(
          `meta ${videoMeta.codec} ${videoMeta.width}x${videoMeta.height} fps=${fps}`,
          'ok',
        );

        // 约 1 个 GOP 的样本（前 1s）
        const { chunks, api } = await readSamplesLikeProduction(Math.min(1, duration || 1));
        if (!chunks.length) throw new Error('无样本');
        sampleChunks = chunks;
        log(`样本 api=${api} count=${chunks.length} ts0=${chunks[0].timestamp} type0=${chunks[0].type}`, 'ok');

        // 探测浏览器解析后的实际 hardwareAcceleration
        for (const ha of [undefined, 'prefer-software', 'prefer-hardware']) {
          const cfg = {
            codec: videoMeta.codec,
            codedWidth: videoMeta.width,
            codedHeight: videoMeta.height,
            description: videoMeta.description,
            optimizeForLatency: true,
          };
          if (ha) cfg.hardwareAcceleration = ha;
          const support = await VideoDecoder.isConfigSupported(cfg);
          log(
            `isConfigSupported ha=${ha ?? '(omit)'} → supported=${support.supported} resolved=${JSON.stringify(
              support.config
                ? {
                  codec: support.config.codec,
                  hardwareAcceleration: support.config.hardwareAcceleration,
                  optimizeForLatency: support.config.optimizeForLatency,
                }
                : null,
            )}`,
          );
        }

        runBtn.disabled = false;
        setHeartbeat('');
      } catch (e) {
        log(`加载失败: ${e.message}`, 'err');
        console.error(e);
        setHeartbeat('');
      }
    });

    function makeDecoder(config, onError) {
      let outputs = 0;
      const decoder = new VideoDecoder({
        output: (frame) => {
          outputs++;
          frame.close();
        },
        error: (e) => onError?.(e),
      });
      decoder.configure(config);
      return { decoder, getOutputs: () => outputs };
    }

    async function runLoopCase(c, timeoutMs, loops) {
      const config = buildConfig(c);
      const support = await VideoDecoder.isConfigSupported(config);
      if (!support.supported) {
        return { ok: false, ms: 0, note: `unsupported resolved=${JSON.stringify(support.config)}` };
      }
      const resolvedHa = support.config?.hardwareAcceleration ?? '?';
      const { decoder, getOutputs } = makeDecoder(config, (e) =>
        log(`[${c.id}] ${e.message}`, 'err'),
      );
      const t0 = performance.now();
      try {
        for (let i = 0; i < loops; i++) {
          if (aborted) throw new Error('用户中止');
          if (decoder.state === 'closed') throw new Error('decoder 已 closed');
          startHeartbeat(`${c.id} loop ${i + 1}/${loops} (ha→${resolvedHa})`);
          const batch = cloneChunks(sampleChunks);
          for (const ch of batch) decoder.decode(ch);
          await flushWithTimeout(decoder, timeoutMs, `${c.id}#${i + 1}`);
        }
        const ms = performance.now() - t0;
        safeClose(decoder);
        return {
          ok: true,
          ms,
          note: `loops=${loops} output≈${getOutputs()} resolvedHa=${resolvedHa}`,
        };
      } catch (e) {
        const ms = performance.now() - t0;
        safeClose(decoder);
        return { ok: false, ms, note: `${e.message}; resolvedHa=${resolvedHa}` };
      } finally {
        stopHeartbeat();
      }
    }

    async function runMultiCase(c, timeoutMs, lanes, loopsPerLane) {
      const config = buildConfig(c);
      const support = await VideoDecoder.isConfigSupported(config);
      if (!support.supported) {
        return { ok: false, ms: 0, note: 'unsupported' };
      }
      const resolvedHa = support.config?.hardwareAcceleration ?? '?';
      const t0 = performance.now();
      const decoders = [];
      try {
        startHeartbeat(`${c.id} 创建 ${lanes} 路 (ha→${resolvedHa})`);
        for (let i = 0; i < lanes; i++) {
          decoders.push(
            makeDecoder(config, (e) => log(`[${c.id} lane${i}] ${e.message}`, 'err')),
          );
        }
        // 并发：每路各自 decode+flush（loopsPerLane 次）
        await Promise.all(
          decoders.map(async ({ decoder }, lane) => {
            for (let i = 0; i < loopsPerLane; i++) {
              if (aborted) throw new Error('用户中止');
              if (decoder.state === 'closed') throw new Error(`lane${lane} closed`);
              startHeartbeat(`${c.id} lane${lane + 1} loop ${i + 1}/${loopsPerLane}`);
              const batch = cloneChunks(sampleChunks);
              for (const ch of batch) decoder.decode(ch);
              await flushWithTimeout(decoder, timeoutMs, `${c.id} L${lane + 1}#${i + 1}`);
            }
          }),
        );
        const ms = performance.now() - t0;
        decoders.forEach((d) => safeClose(d.decoder));
        return {
          ok: true,
          ms,
          note: `lanes=${lanes} loops/lane=${loopsPerLane} resolvedHa=${resolvedHa}`,
        };
      } catch (e) {
        const ms = performance.now() - t0;
        decoders.forEach((d) => safeClose(d.decoder));
        return { ok: false, ms, note: `${e.message}; resolvedHa=${resolvedHa}` };
      } finally {
        stopHeartbeat();
      }
    }

    abortBtn.addEventListener('click', () => {
      aborted = true;
      log('已请求中止', 'err');
    });

    runBtn.addEventListener('click', async () => {
      if (!sampleChunks.length) return;
      aborted = false;
      runBtn.disabled = true;
      abortBtn.disabled = false;
      const timeoutMs = Number(timeoutEl.value) || 5000;
      const loops = Number(loopsEl.value) || 40;
      const lanes = Number(lanesEl.value) || 4;
      log(`压力矩阵 timeout=${timeoutMs} loops=${loops} lanes=${lanes} platform=${navigator.platform}`);

      const results = [];
      for (const c of CASES) {
        if (aborted) {
          setRow(c.id, 'SKIP', null, '中止');
          continue;
        }
        setRow(c.id, 'RUN', null, '…');
        log(`→ ${c.id} ${c.title}`);
        await paint();
        let r;
        if (c.kind === 'loop') {
          r = await runLoopCase(c, timeoutMs, loops);
        } else if (c.kind === 'multi') {
          r = await runMultiCase(c, timeoutMs, lanes, 1);
        } else {
          r = await runMultiCase(c, timeoutMs, lanes, Math.max(5, Math.floor(loops / 4)));
        }
        results.push({ id: c.id, ...r });
        setRow(c.id, r.ok ? 'PASS' : 'FAIL', r.ms, r.note);
        log(`${c.id} ${r.ok ? 'PASS' : 'FAIL'} ${r.ms.toFixed(0)}ms ${r.note}`, r.ok ? 'ok' : 'err');
        await new Promise((x) => setTimeout(x, 200));
      }

      const get = (id) => results.find((x) => x.id === id);
      log('—— 解读 ——', 'info');
      const soft = get('S0-soft-loop');
      const def = get('S1-default-loop');
      const hw = get('S2-hw-loop');
      const mDef = get('M1-default-multi');
      const mHw = get('M2-hw-multi');
      const mStress = get('M3-default-multi-loop');

      if (soft?.ok && (!def?.ok || !hw?.ok)) {
        log('倾向：反复 flush 下默认/硬解会挂，prefer-software 仍必要。', 'ok');
      } else if (soft?.ok && def?.ok && hw?.ok && (!mDef?.ok || !mHw?.ok || !mStress?.ok)) {
        log('倾向：单路反复 OK，多路并发才触发（多视频场景）。', 'ok');
      } else if (results.every((r) => r.ok)) {
        log(
          '压力矩阵仍全 PASS：硬件 flush hang 在此机/此片上复现不了。请对照生产：是否多路、是否远程 URL/OPFS、去掉配置后控制台完整报错。',
          'info',
        );
      } else {
        log('混合结果，请把表格发回。', 'info');
      }

      setHeartbeat('');
      runBtn.disabled = false;
      abortBtn.disabled = true;
    });

    renderRows();
    log('强刷本页后选同一视频。关注日志里 isConfigSupported 的 resolved.hardwareAcceleration。');
  </script>
</body>

</html>
